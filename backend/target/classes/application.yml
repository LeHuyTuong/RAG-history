server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: history-rag-backend
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/history_rag}
    username: ${MYSQL_USER:history}
    password: ${MYSQL_PASSWORD:khoi123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_REQUEST_SIZE:25MB}
jwt:
  secret-key: ${JWT_SECRET_KEY:your-very-long-secret-key-for-jwt-authentication-2026}
  # 15 minutes
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900}
  # 3 days
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:259200}
management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  rag:
    base-url: ${RAG_SERVICE_URL:http://localhost:8001}
  upload:
    base-path: ${UPLOAD_BASE_PATH:./uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
